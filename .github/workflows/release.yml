# SPDX-License-Identifier: GPL-3.0-or-later
# Triggered by a vX.Y.Z tag push.
# Builds a signed release APK twice from a clean tree, compares the binary hashes,
# creates a GitHub Release, and uploads the verified APK plus SHA-256 sidecar.
#
# Required GitHub Secrets:
#   SIGNING_KEYSTORE_BASE64  — base64-encoded AppManagerNG-release.jks
#   SIGNING_STORE_PASSWORD   — keystore store password
#   SIGNING_KEY_ALIAS        — key alias (release)
#   SIGNING_KEY_PASSWORD     — key password

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & publish release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/versions.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/AppManagerNG-release.jks

      - name: Write keystore.properties
        run: |
          cat > app/keystore.properties <<EOF
          storeFile=AppManagerNG-release.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Verify reproducible release APK
        run: bash scripts/verify_reproducible_release.sh

      - name: Locate APK artifacts
        id: apks
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PUBLISH_DIR="build/reproducible-release/publish"
          ASSET_LIST="build/reproducible-release/github-release-assets.txt"
          : > "$ASSET_LIST"
          shopt -s nullglob
          for SRC in "$PUBLISH_DIR"/*.apk; do
            FILE="$(basename "$SRC")"
            DEST_NAME="$(printf '%s' "$FILE" | sed "s/^AppManagerNG-reproducible/AppManagerNG-${VERSION}/")"
            DEST="app/build/outputs/apk/release/$DEST_NAME"
            CHECKSUM="${DEST}.sha256"
            cp "$SRC" "$DEST"
            HASH="$(sha256sum "$DEST" | awk '{print $1}')"
            printf '%s  %s\n' "$HASH" "$(basename "$DEST")" > "$CHECKSUM"
            printf '%s\n%s\n' "$DEST" "$CHECKSUM" >> "$ASSET_LIST"
          done
          if [[ ! -s "$ASSET_LIST" ]]; then
            echo "::error::No reproducible APK artifacts were found in $PUBLISH_DIR" >&2
            exit 1
          fi
          echo "ASSET_LIST=$ASSET_LIST" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t ASSETS < "${{ steps.apks.outputs.ASSET_LIST }}"
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "${ASSETS[@]}" --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "AppManagerNG ${{ github.ref_name }}" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
