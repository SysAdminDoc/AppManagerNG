# Triggered by a vX.Y.Z tag push.
# Builds a signed release APK (arm64-v8a + universal), creates a GitHub Release,
# and uploads both APK variants as release assets.
#
# Required GitHub Secrets:
#   SIGNING_KEYSTORE_BASE64  — base64-encoded AppManagerNG-release.jks
#   SIGNING_STORE_PASSWORD   — keystore store password
#   SIGNING_KEY_ALIAS        — key alias (release)
#   SIGNING_KEY_PASSWORD     — key password

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & publish release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/versions.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/AppManagerNG-release.jks

      - name: Write keystore.properties
        run: |
          cat > app/keystore.properties <<EOF
          storeFile=AppManagerNG-release.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build release APKs
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK artifacts
        id: apks
        run: |
          SRC="app/build/outputs/apk/release/app-release.apk"
          DEST="app/build/outputs/apk/release/AppManagerNG-${{ steps.version.outputs.VERSION }}-universal.apk"
          mv "$SRC" "$DEST"
          echo "UNIVERSAL=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "${{ steps.apks.outputs.UNIVERSAL }}" --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "AppManagerNG ${{ github.ref_name }}" \
              --generate-notes \
              "${{ steps.apks.outputs.UNIVERSAL }}"
          fi
